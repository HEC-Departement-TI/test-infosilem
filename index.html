<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title text="${roomId}">Salle</title>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/room.css"/>
  <script>
    var config = {
      refreshTimeout: 5,
      refreshJitter: 2,
      contextPath: ''
    };
  </script>
  <script src="/js/room.js" defer></script>
</head>
<body>
  <div class="screen">
    <header>
      <img class="logo" src="img/logo.png" alt="Logo HEC" />
      <h1 class="room-id">Salle</h1>
      <div class="room-date" id="room-date"></div>
    </header>

    <main class="timeline">
      <div class="loading"></div>
      <div class="hour-gutter" id="hour-gutter"></div>
      <div class="timeline-canvas" id="bookings"></div>
    </main>

    <footer class="status-bar">
      <span class="status" id="status">–</span>
      <span class="last-updated" id="last-updated"></span>
    </footer>
  </div>
</body>
</html>
